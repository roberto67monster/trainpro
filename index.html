<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrainPro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
  margin:0;
  padding:0;
}
header{
  background:#111;
  border-bottom:3px solid #e10600;
  padding:20px;
  text-align:center;
}
header h1{
  margin:0;
  font-size:32px;
  letter-spacing:2px;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
.card{
  background:#151515;
  padding:20px;
  border-radius:20px;
  border:1px solid #222;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}
.card h2{
  margin-top:0;
  color:#e10600;
}
input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#0f0f0f;
  border:1px solid #333;
  border-radius:10px;
  color:white;
}
button{
  background:#e10600;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
}
button:hover{
  background:#ff2a2a;
}
#aiOutput{
  margin-top:10px;
  font-style:italic;
  color:#ccc;
  min-height:40px;
  white-space:pre-wrap;
}
.progress-container{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:15px;
}
canvas{
  max-width:120px;
  max-height:120px;
}
</style>
</head>
<body>

<header>
<h1>⚽ TrainPro</h1>
</header>

<div class="container">
<div class="grid">

<!-- AI + Log Input -->
<div class="card">
<h2>Log Training / Ask AI</h2>
<textarea id="freeInput" placeholder="Example: 300 touches, speed workout, shooting drills or ask a question" rows="3"></textarea>
<button onclick="processInput()">Submit</button>
<p id="aiOutput">AI feedback will appear here (backend required for live responses).</p>
</div>

<!-- Daily Logs -->
<div class="card">
<h2>Daily Logs</h2>
<select id="daySelect">
<option>Monday</option><option>Tuesday</option><option>Wednesday</option>
<option>Thursday</option><option>Friday</option><option>Saturday</option>
<option>Sunday</option>
</select>
<input id="dayTouches" placeholder="Touches">
<input id="daySpeed" placeholder="Speed Sessions">
<input id="dayGym" placeholder="Gym Sessions">
<button onclick="logDay()">Log Day</button>
<ul id="dailyLogs"></ul>
</div>

<!-- Circular Progress -->
<div class="card">
<h2>Weekly Progress</h2>
<div class="progress-container">
  <canvas id="touchesChart"></canvas>
  <canvas id="speedChart"></canvas>
  <canvas id="gymChart"></canvas>
</div>
</div>

<!-- Notes -->
<div class="card">
<h2>Notes</h2>
<textarea id="notesInput" placeholder="Add a note for today"></textarea>
<button onclick="saveNote()">Save Note</button>
<p id="noteList"></p>
</div>

</div>
</div>

<script>
// ---------- Data Storage ----------
let touches=[], speed=[], gym=[], notes=[], dailyLogs=[];
if(localStorage.getItem('touches')) touches=JSON.parse(localStorage.getItem('touches'));
if(localStorage.getItem('speed')) speed=JSON.parse(localStorage.getItem('speed'));
if(localStorage.getItem('gym')) gym=JSON.parse(localStorage.getItem('gym'));
if(localStorage.getItem('notes')) notes=JSON.parse(localStorage.getItem('notes'));
if(localStorage.getItem('dailyLogs')) dailyLogs=JSON.parse(localStorage.getItem('dailyLogs'));

// ---------- Update Functions ----------
function updateTotals(){
  document.getElementById('noteList').innerText=notes.join(' | ');
  document.getElementById('dailyLogs').innerHTML=dailyLogs.map(d=>"<li>"+d.day+": "+d.touches+" touches, "+d.speed+" speed, "+d.gym+" gym</li>").join('');
  updateCharts();
}

function saveNote(){
  let t=document.getElementById('notesInput').value;
  if(t){notes.push(t);localStorage.setItem('notes',JSON.stringify(notes));document.getElementById('notesInput').value='';updateTotals();}
}

function logDay(){
  let day=document.getElementById('daySelect').value;
  let t=parseInt(document.getElementById('dayTouches').value)||0;
  let s=parseInt(document.getElementById('daySpeed').value)||0;
  let g=parseInt(document.getElementById('dayGym').value)||0;
  dailyLogs.push({day:day,touches:t,speed:s,gym:g});
  localStorage.setItem('dailyLogs',JSON.stringify(dailyLogs));
  touches.push(t); speed.push(s); gym.push(g);
  localStorage.setItem('touches',JSON.stringify(touches));
  localStorage.setItem('speed',JSON.stringify(speed));
  localStorage.setItem('gym',JSON.stringify(g));
  document.getElementById('dayTouches').value='';
  document.getElementById('daySpeed').value='';
  document.getElementById('dayGym').value='';
  updateTotals();
}

// ---------- Circular Progress Charts ----------
const touchesCtx=document.getElementById('touchesChart').getContext('2d');
const speedCtx=document.getElementById('speedChart').getContext('2d');
const gymCtx=document.getElementById('gymChart').getContext('2d');

let touchesChart=new Chart(touchesCtx,{type:'doughnut',data:{labels:['Touches','Remaining'],datasets:[{data:[0,100],backgroundColor:['#e10600','#222']}]},options:{cutout:'70%',plugins:{legend:{display:false}}}});
let speedChart=new Chart(speedCtx,{type:'doughnut',data:{labels:['Speed','Remaining'],datasets:[{data:[0,100],backgroundColor:['#e10600','#222']}]},options:{cutout:'70%',plugins:{legend:{display:false}}}});
let gymChart=new Chart(gymCtx,{type:'doughnut',data:{labels:['Gym','Remaining'],datasets:[{data:[0,100],backgroundColor:['#e10600','#222']}]},options:{cutout:'70%',plugins:{legend:{display:false}}}});

function updateCharts(){
  let t=touches.reduce((a,b)=>a+b,0);
  let s=speed.reduce((a,b)=>a+b,0);
  let g=gym.reduce((a,b)=>a+b,0);
  touchesChart.data.datasets[0].data=[t,Math.max(100-t,0)];
  speedChart.data.datasets[0].data=[s,Math.max(100-s,0)];
  gymChart.data.datasets[0].data=[g,Math.max(100-g,0)];
  touchesChart.update();
  speedChart.update();
  gymChart.update();
}

// ---------- AI (visual only, backend needed) ----------
function processInput(){
  let input=document.getElementById('freeInput').value;
  let t=(input.match(/(\d+)\s*touch/)||[0,0])[1]*1;
  let s=(input.match(/(\d+)\s*speed/)||[0,0])[1]*1;
  let g=(input.match(/(\d+)\s*gym/)||[0,0])[1]*1;
  if(t>0){touches.push(t);localStorage.setItem('touches',JSON.stringify(touches));}
  if(s>0){speed.push(s);localStorage.setItem('speed',JSON.stringify(speed));}
  if(g>0){gym.push(g);localStorage.setItem('gym',JSON.stringify(gym));}
  updateTotals();
  document.getElementById('freeInput').value='';
  document.getElementById('aiOutput').innerText="AI not connected. Backend required for live responses.";
}

updateTotals();
</script>

</body>
</html>
